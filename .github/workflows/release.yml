name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get tag version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Get Version Code
        id: get_version_code
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true

      - name: Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          APK_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-debug.apk"
        run: |
          cat <<EOF > update.json
          {
            "versionCode": ${{ env.VERSION_CODE }},
            "versionName": "${{ env.VERSION }}",
            "apkUrl": "${APK_URL}",
            "releaseNotes": "See GitHub Releases for details."
          }
          EOF
          
          # We update the Gist ID 7c19255da1430800f0030ba3c6e99765
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/7c19255da1430800f0030ba3c6e99765 \
            -d "{\"files\":{\"update.json\":{\"content\":$(jq -Rs . < update.json)}}}"
