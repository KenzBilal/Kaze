name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > kaze-release.jks

      - name: Inject API Keys
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: |
          echo "tmdb.api.key=${TMDB_API_KEY}" >> gradle.properties
          echo "omdb.api.key=${OMDB_API_KEY}" >> gradle.properties

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/kaze-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get Version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          APK_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.apk"
        run: |
          cat <<EOF > update.json
          {
            "versionCode": ${{ env.VERSION_CODE }},
            "versionName": "${{ env.VERSION }}",
            "apkUrl": "${APK_URL}",
            "releaseNotes": "See GitHub Releases for details."
          }
          EOF

          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/7c19255da1430800f0030ba3c6e99765 \
            -d "{\"files\":{\"update.json\":{\"content\":$(jq -Rs . < update.json)}}}"
